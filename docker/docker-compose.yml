services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: sportix-backend
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - sportix-data:/app/src/data  # Volume persistant pour les données
    env_file:
      - ../server/.env  # Créer depuis server/.env.example avant de lancer Docker
    restart: unless-stopped
    networks:
      - sportix-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: sportix-frontend
    ports:
      - "${NG_PORT:-4200}:4200"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sportix-network

networks:
  sportix-network:
    driver: bridge
    name: ${DOCKER_NETWORK:-sportix-network}

volumes:
  sportix-data:
    name: ${COMPOSE_PROJECT_NAME:-sportix-public}-data
